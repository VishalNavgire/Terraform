#To configure manual approvals for QA, Staging, and Prod,
#navigate to your GitHub Repository Settings $\rightarrow$ Environments $\rightarrow$ Create environments named qa, staging, and prod, and check Required reviewers.
name: "Azure Infrastructure Deployment"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}

jobs:
  # STEP 1 to 4: Dev Deployment
  deploy-dev:
    name: "Deploy Dev Environment"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HashiCorp Terraform Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init & Apply
        run: |
          cd environments/dev
          terraform init
          terraform apply -auto-approve

  # STEP 5 & 6: QA Deployment (Runs after Dev completes successfully)
  deploy-qa:
    name: "Deploy QA Environment"
    needs: deploy-dev
    environment: qa # Triggers GitHub environment gate approvals
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HashiCorp Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init & Apply
        run: |
          cd environments/qa
          terraform init
          terraform apply -auto-approve

  # STEP 7 & 8: Staging Deployment (Runs after QA completes)
  deploy-staging:
    name: "Deploy Staging Environment"
    needs: deploy-qa
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HashiCorp Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init & Apply
        run: |
          cd environments/staging
          terraform init
          terraform apply -auto-approve

  # STEP 9 & 10: Production Deployment (Runs after Staging completes)
  deploy-prod:
    name: "Deploy Prod Environment"
    needs: deploy-staging
    environment: prod #The environment: prod statement inside your GitHub Actions YAML file tells the runner workflow engine to query GitHub's internal protection policies before executing the block steps.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HashiCorp Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init & Apply
        run: |
          cd environments/prod
          terraform init
          terraform apply -auto-approve