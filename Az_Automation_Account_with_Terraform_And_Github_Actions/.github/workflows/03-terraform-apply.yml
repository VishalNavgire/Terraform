name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  terraform-apply:

    runs-on: ubuntu-latest

    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    steps:

      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file=runbooks.tfvars \
            -auto-approve
  
  notify-success:

    needs: terraform-apply

    if: success()

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Teams Success Notification
        shell: pwsh
        env:
          TEAMS_INFO_WEBHOOK: ${{ secrets.TEAMS_INFO_WEBHOOK }}
        run: |

          . ./modules/notifications/powershell/Send-TeamsNotification.ps1

          Send-TeamsNotification `
            -Severity INFO `
            -PipelineName "Terraform Apply" `
            -Message "Terraform deployment completed successfully." `
            -Repository "${{ github.repository }}" `
            -Branch "${{ github.ref_name }}" `
            -Committer "${{ github.actor }}" `
            -WorkflowUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-failure:

    needs: terraform-apply

    if: failure()

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Teams Failure Notification
        shell: pwsh
        env:
          TEAMS_ERROR_WEBHOOK: ${{ secrets.TEAMS_ERROR_WEBHOOK }}
        run: |

          . ./modules/notifications/powershell/Send-TeamsNotification.ps1

          Send-TeamsNotification `
            -Severity ERROR `
            -PipelineName "Terraform Apply" `
            -Message "Terraform deployment failed. Review workflow logs immediately." `
            -Repository "${{ github.repository }}" `
            -Branch "${{ github.ref_name }}" `
            -Committer "${{ github.actor }}" `
            -WorkflowUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"