name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  terraform-apply:

    runs-on: ubuntu-latest

    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    steps:

      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file=runbooks.tfvars \
            -auto-approve