name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  terraform-plan:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:

      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=runbooks.tfvars \
            -out=tfplan

      - name: Generate Plan Output
        run: |
          terraform show -no-color tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/tfplan
            terraform/plan.txt

  notify-plan:

      needs: terraform-plan

      if: success()

      runs-on: ubuntu-latest

      steps:

        - uses: actions/checkout@v4

        - name: Teams Notification
          shell: pwsh
          env:
            TEAMS_INFO_WEBHOOK: ${{ secrets.TEAMS_INFO_WEBHOOK }}
          run: |

            . ./modules/notifications/powershell/Send-TeamsNotification.ps1

            Send-TeamsNotification `
              -Severity INFO `
              -PipelineName "Terraform Plan" `
              -Message "Terraform plan generated successfully. Review plan artifact before approving deployment." `
              -Repository "${{ github.repository }}" `
              -Branch "${{ github.head_ref }}" `
              -Committer "${{ github.actor }}" `
              -WorkflowUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"