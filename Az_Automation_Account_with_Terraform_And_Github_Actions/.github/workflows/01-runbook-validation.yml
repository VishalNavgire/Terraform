name: Runbook Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'runbooks/**'

permissions:
  contents: read
  pull-requests: write

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      powershell_changed: ${{ steps.filter.outputs.powershell }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'runbooks/python/**/*.py'
            powershell:
              - 'runbooks/powershell/**/*.ps1'

  python-lint:
    needs: detect-changes

    if: needs.detect-changes.outputs.python_changed == 'true'

    uses: ./.github/workflows/04-build-pylint.yml

    with:
      python-version: "3.12"

  powershell-lint:
    needs: detect-changes

    if: needs.detect-changes.outputs.powershell_changed == 'true'

    uses: ./.github/workflows/05-build-powershell.yml

  notify-teams:

    needs:
      - python-lint
      - powershell-lint

    if: success()

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Send Teams Success Notification
        shell: pwsh
        env:
          TEAMS_INFO_WEBHOOK: ${{ secrets.TEAMS_INFO_WEBHOOK }}
        run: |

          . ./modules/notifications/powershell/Send-TeamsNotification.ps1

          Send-TeamsNotification `
            -Severity INFO `
            -PipelineName "Runbook Validation" `
            -Message "Runbook validation completed successfully. Code is ready for review and merge." `
            -Repository "${{ github.repository }}" `
            -Branch "${{ github.head_ref }}" `
            -Committer "${{ github.actor }}" `
            -WorkflowUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-failure:

    needs:
      - python-lint
      - powershell-lint

    if: failure()

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Send Teams Failure Notification
        shell: pwsh
        env:
          TEAMS_FAILURE_WEBHOOK: ${{ secrets.TEAMS_FAILURE_WEBHOOK }}
        run: |

          . ./modules/notifications/powershell/Send-TeamsNotification.ps1

          Send-TeamsNotification `
            -Severity FAILURE `
            -PipelineName "Runbook Validation" `
            -Message "Runbook validation failed. Review pipeline logs." `
            -Repository "${{ github.repository }}" `
            -Branch "${{ github.head_ref }}" `
            -Committer "${{ github.actor }}" `
            -WorkflowUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"